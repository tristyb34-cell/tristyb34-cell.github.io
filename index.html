<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DAX</title>
  <meta name="description" content="DAX — the long game. Show up, build, repeat." />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0A0907" />

  <!-- favicon (gold on black) -->
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/icons/favicon-64.png" />

  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DAX" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-180.png" />

  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">DAX</span>
        <span class="brand-sub" id="header-sub">the long game</span>
      </div>
      <span class="app-version" id="app-version"></span>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" id="tabbar"></nav>

    <!-- screen-reader live region: lives outside #view so paint() never wipes it -->
    <div id="sr-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
