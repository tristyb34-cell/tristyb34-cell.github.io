name: DAX reminders

# Targeted UTC times (SA local minus 2h), one per reminder so each fires once.
# The send script gates by day of week and uses a 20-min window to absorb cron drift.
on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test push now'
        type: boolean
        default: false
  schedule:
    - cron: '0 5 * * 6'     # 07:00 SA — Saturday shake (gym is mornings only)
    - cron: '0 6 * * 6'     # 08:00 SA — Saturday train
    - cron: '30 6 * * *'    # 08:30 SA — weekday smoothie + creatine
    - cron: '0 8 * * *'     # 10:00 SA — learning nudge, EVERY day
    - cron: '30 8 * * *'    # 10:30 SA — Sunday smoothie + creatine
    - cron: '0 10 * * *'    # 12:00 SA — rest-day check-in (Mon/Wed/Sun)
    - cron: '0 11 * * *'    # 13:00 SA — lunch
    - cron: '30 13 * * *'   # 15:30 SA — weekend snack
    - cron: '0 15 * * *'    # 17:00 SA — weekday afternoon snack
    - cron: '0 16 * * *'    # 18:00 SA — weekday train
    - cron: '0 17 * * *'    # 19:00 SA — weekend dinner + Sunday weekly review
    - cron: '30 17 * * *'   # 19:30 SA — weekday dinner

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install web-push@3 --no-save
      - run: node scripts/send-due-reminders.js
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          TEST: ${{ inputs.test }}
